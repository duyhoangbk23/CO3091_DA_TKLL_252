[platformio]
default_envs = nodemcu_32s

[env:nodemcu_32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200

build_flags = 
    -I include
    -I ../common
    -I ../iot_backend

lib_deps =
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.5
