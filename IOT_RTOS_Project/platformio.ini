[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

build_flags = 
    -I common
    -I hardware/main
    -I rtos/include    ; Folder chứa tasks.h và config.h
    -I rtos/src        ; Để các file trong src tìm thấy nhau
    -I iot_backend
; Khai báo các thư viện cần thiết cho đồ án 
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    marcoschwartz/LiquidCrystal_I2C @ ^1.1.4
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^6.21.5
