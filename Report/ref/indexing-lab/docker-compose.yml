services:
  mysql:
    image: mysql:8.4
    container_name: indexing_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: indexing_lab
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
      - ./mysql/tests:/tests:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  mongo:
    image: mongo:7.0
    container_name: indexing_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: indexing_lab
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
      - ./mongo/tests:/tests:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u root -p root --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql_data:
  mongo_data:
